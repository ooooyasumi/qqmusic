<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>同担默契局</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2317d783'/%3E%3Cpath d='M40 14v28.5a8.5 8.5 0 1 1-4-7.2V20h14v-6H40Z' fill='%2307110d'/%3E%3C/svg%3E">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg: #090f0d;
      --surface: #101714;
      --surface-2: #17211d;
      --surface-3: #1d2924;
      --ink: #f6f7ef;
      --muted: #b5beb7;
      --dim: #78837d;
      --line: rgba(246, 247, 239, .12);
      --green: #17d783;
      --mint: #9cf6c7;
      --amber: #ffd166;
      --pink: #ff6f91;
      --cyan: #5bd8ff;
      --danger: #ff775f;
      --shadow: 0 18px 42px rgba(0, 0, 0, .36);
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      color: var(--ink);
      background: var(--bg);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 20% 0%, rgba(23, 215, 131, .2), transparent 22rem),
        radial-gradient(circle at 90% 20%, rgba(255, 111, 145, .14), transparent 18rem),
        linear-gradient(160deg, #090f0d 0%, #101714 54%, #12151b 100%);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    h1 {
      font-size: clamp(34px, 10vw, 48px);
      line-height: .96;
      letter-spacing: 0;
    }

    h2 {
      font-size: 23px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    h3 {
      font-size: 16px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .app {
      width: min(430px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      position: relative;
      background: rgba(9, 15, 13, .78);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, .05), var(--shadow);
      overflow: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 58px;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: rgba(9, 15, 13, .84);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #06100c;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      box-shadow: 0 10px 22px rgba(23, 215, 131, .22);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--ink);
      background: rgba(255, 255, 255, .06);
      border: 1px solid var(--line);
    }

    .icon-btn:disabled {
      opacity: .38;
      cursor: not-allowed;
    }

    main {
      min-height: calc(100vh - 58px);
    }

    .screen {
      min-height: calc(100vh - 58px);
      padding: 16px;
      display: block;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    .eyebrow {
      color: var(--mint);
      font-size: 12px;
      font-weight: 850;
    }

    .subcopy {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.58;
    }

    .home-hero {
      min-height: 178px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(23, 215, 131, .18), transparent 44%),
        linear-gradient(35deg, rgba(255, 209, 102, .13), rgba(155, 140, 255, .14)),
        #101714;
    }

    .home-hero::after {
      content: "";
      position: absolute;
      right: -26px;
      top: 18px;
      width: 128px;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 18px solid rgba(255, 255, 255, .08);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, .08);
    }

    .section-head {
      margin: 22px 0 12px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }

    .section-head p {
      color: var(--dim);
      font-size: 12px;
      line-height: 1.45;
    }

    .masonry {
      column-count: 2;
      column-gap: 10px;
    }

    .artist-tile {
      width: 100%;
      min-height: 0;
      margin: 0 0 10px;
      break-inside: avoid;
      display: inline-block;
      padding: 0;
      color: var(--ink);
      text-align: left;
      background: transparent;
    }

    .artist-poster {
      aspect-ratio: 3 / 4;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, .13);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background:
        linear-gradient(150deg, var(--accent, #17d783), transparent 52%),
        linear-gradient(20deg, rgba(255, 255, 255, .1), transparent),
        #16211d;
      box-shadow: 0 12px 28px rgba(0, 0, 0, .2);
    }

    .artist-tile:nth-child(2n) .artist-poster {
      margin-top: 22px;
    }

    .artist-poster::before {
      content: "";
      position: absolute;
      right: -36px;
      bottom: -34px;
      width: 128px;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 22px solid rgba(255, 255, 255, .13);
    }

    .artist-poster::after {
      content: attr(data-short);
      position: absolute;
      right: 10px;
      bottom: 8px;
      color: rgba(255, 255, 255, .16);
      font-size: 38px;
      font-weight: 950;
      letter-spacing: 0;
    }

    .artist-name {
      position: relative;
      z-index: 1;
      max-width: 120px;
      font-size: 24px;
      line-height: 1;
      font-weight: 950;
    }

    .artist-hook {
      position: relative;
      z-index: 1;
      color: rgba(255, 255, 255, .82);
      font-size: 12px;
      line-height: 1.45;
    }

    .tile-meta {
      padding: 9px 2px 0;
    }

    .tile-meta strong {
      display: block;
      font-size: 13px;
    }

    .tile-meta span {
      display: block;
      margin-top: 3px;
      color: var(--dim);
      font-size: 12px;
      line-height: 1.35;
    }

    .panel,
    .song-card,
    .rank-card,
    .result-card,
    .mini-card {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(16, 23, 20, .86);
    }

    .artist-hero {
      min-height: 184px;
      padding: 18px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, .13);
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(140deg, var(--accent, #17d783), transparent 44%),
        linear-gradient(20deg, rgba(255, 209, 102, .13), rgba(91, 216, 255, .08)),
        #121c18;
    }

    .artist-hero::after {
      content: attr(data-short);
      position: absolute;
      right: 12px;
      bottom: -8px;
      color: rgba(255, 255, 255, .1);
      font-size: 86px;
      line-height: 1;
      font-weight: 950;
    }

    .artist-hero-content {
      position: relative;
      z-index: 1;
      max-width: 310px;
    }

    .stats-card {
      margin-top: 12px;
      padding: 15px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .stats-card strong {
      display: block;
      margin-top: 6px;
      font-size: 30px;
      line-height: .95;
    }

    .stats-count {
      color: var(--mint);
      font-size: 44px;
      line-height: 1;
      font-weight: 950;
    }

    .stats-count small {
      color: var(--muted);
      font-size: 20px;
    }

    .search-box {
      position: sticky;
      top: 70px;
      z-index: 12;
      margin: 14px 0 12px;
      border-radius: 8px;
      display: grid;
      grid-template-columns: 38px 1fr;
      align-items: center;
      color: var(--dim);
      background: rgba(16, 23, 20, .94);
      border: 1px solid var(--line);
      backdrop-filter: blur(16px);
    }

    .search-box svg {
      justify-self: center;
    }

    .search-box input {
      width: 100%;
      min-height: 48px;
      color: var(--ink);
      background: transparent;
      border: 0;
      outline: 0;
      font-weight: 760;
    }

    .search-box input::placeholder {
      color: var(--dim);
    }

    .song-list {
      display: grid;
      gap: 9px;
      padding-bottom: 194px;
    }

    .song-card {
      width: 100%;
      min-height: 76px;
      padding: 10px;
      display: grid;
      grid-template-columns: 58px 1fr auto;
      gap: 11px;
      align-items: center;
      color: var(--ink);
      text-align: left;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .song-card.selected {
      border-color: rgba(23, 215, 131, .78);
      background: rgba(23, 215, 131, .12);
    }

    .song-card.disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .cover-art {
      width: 58px;
      height: 58px;
      border-radius: 8px;
      position: relative;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, .82);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .18), transparent 42%),
        linear-gradient(145deg, var(--cover-a, #17d783), var(--cover-b, #5bd8ff));
      border: 1px solid rgba(255, 255, 255, .16);
      font-size: 11px;
      font-weight: 950;
      overflow: hidden;
      flex: none;
    }

    .cover-art::before {
      content: "";
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 6px solid rgba(0, 0, 0, .18);
      background: rgba(255, 255, 255, .2);
      position: absolute;
      right: -2px;
      bottom: -2px;
    }

    .cover-art.playing::after {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 50%;
      position: absolute;
      left: 6px;
      bottom: 6px;
      background: var(--amber);
      box-shadow: 8px 0 0 rgba(255, 209, 102, .72), 16px 0 0 rgba(255, 209, 102, .42);
      animation: pulse .8s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      to { transform: translateY(-3px); opacity: .72; }
    }

    .song-info {
      min-width: 0;
    }

    .song-info b {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      line-height: 1.2;
    }

    .song-info span {
      display: block;
      margin-top: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--dim);
      font-size: 12px;
      line-height: 1.35;
    }

    .select-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--mint);
      background: rgba(255, 255, 255, .06);
      border: 1px solid var(--line);
      font-weight: 950;
    }

    .selected-dock {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 18;
      width: min(430px, 100%);
      margin: 0;
      padding: 12px 16px max(16px, env(safe-area-inset-bottom));
      background: linear-gradient(180deg, transparent, rgba(9, 15, 13, .98) 24%);
      border-top: 1px solid rgba(246, 247, 239, .08);
      transform: translateX(-50%);
      backdrop-filter: blur(18px);
    }

    .dock-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 820;
    }

    .dock-head b {
      color: var(--mint);
      font-weight: 950;
    }

    .dock-progress {
      height: 6px;
      margin-bottom: 10px;
      border-radius: 99px;
      overflow: hidden;
      background: rgba(255, 255, 255, .08);
    }

    .dock-progress span {
      display: block;
      width: var(--progress, 0%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--amber));
      transition: width .18s ease;
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 7px;
      margin-bottom: 10px;
    }

    .slot {
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--dim);
      background: rgba(255, 255, 255, .06);
      border: 1px solid var(--line);
      overflow: hidden;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .slot .cover-art {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 50%;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .actions button {
      flex: 1 1 0;
      min-width: 0;
    }

    .primary,
    .secondary,
    .ghost {
      min-height: 48px;
      border-radius: 8px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 880;
      white-space: nowrap;
    }

    .primary {
      flex: 1;
      color: #06100c;
      background: linear-gradient(135deg, var(--green), var(--mint));
      box-shadow: 0 12px 26px rgba(23, 215, 131, .2);
    }

    .primary:disabled {
      opacity: .42;
      cursor: not-allowed;
      box-shadow: none;
    }

    .secondary {
      color: var(--ink);
      background: rgba(255, 255, 255, .07);
      border: 1px solid var(--line);
    }

    .ghost {
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--line);
    }

    .sort-help {
      margin: 14px 0 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      font-weight: 760;
    }

    .rank-list {
      display: grid;
      gap: 9px;
      padding-bottom: 134px;
    }

    .rank-card {
      min-height: 82px;
      padding: 10px;
      display: grid;
      grid-template-columns: 44px 58px 1fr 42px;
      gap: 10px;
      align-items: center;
      touch-action: none;
      user-select: none;
    }

    .rank-card.dragging {
      opacity: .82;
      border-color: rgba(23, 215, 131, .8);
      background: rgba(23, 215, 131, .15);
      transform: scale(.99);
    }

    .rank-no {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #06100c;
      background: var(--amber);
      font-weight: 950;
      font-size: 13px;
    }

    .drag-handle {
      width: 38px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: rgba(255, 255, 255, .06);
      border: 1px solid var(--line);
    }

    .bottom-actions {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 18;
      width: min(430px, 100%);
      margin: 0;
      padding: 12px 16px max(16px, env(safe-area-inset-bottom));
      background: linear-gradient(180deg, transparent, rgba(9, 15, 13, .98) 24%);
      border-top: 1px solid rgba(246, 247, 239, .08);
      transform: translateX(-50%);
      backdrop-filter: blur(18px);
    }

    .share-stage,
    .result-stage {
      min-height: 250px;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid var(--line);
      display: grid;
      align-items: center;
      background:
        radial-gradient(circle at 56% 20%, rgba(23, 215, 131, .24), transparent 8rem),
        linear-gradient(145deg, rgba(255, 255, 255, .07), transparent),
        rgba(16, 23, 20, .9);
    }

    .share-stage h1,
    .result-stage h1 {
      font-size: 38px;
      line-height: 1;
    }

    .result-title-kicker {
      width: max-content;
      max-width: 100%;
      min-height: 30px;
      margin-bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      color: #06100c;
      background: var(--amber);
      font-size: 12px;
      font-weight: 950;
    }

    .creator-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #06100c;
      background: linear-gradient(135deg, var(--green), var(--amber));
      font-weight: 950;
    }

    .stack-card {
      margin-top: 16px;
      padding: 14px;
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 12px;
      align-items: center;
    }

    .cover-stack {
      height: 76px;
      position: relative;
    }

    .cover-stack .cover-art {
      position: absolute;
      width: 62px;
      height: 62px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .24);
    }

    .cover-stack .cover-art:nth-child(1) { left: 0; top: 10px; }
    .cover-stack .cover-art:nth-child(2) { left: 32px; top: 4px; }
    .cover-stack .cover-art:nth-child(3) { left: 64px; top: 0; }

    .result-score {
      margin: 12px 0;
      color: var(--mint);
      font-size: 76px;
      line-height: .9;
      font-weight: 950;
    }

    .score-bar {
      height: 10px;
      margin-top: 12px;
      border-radius: 99px;
      overflow: hidden;
      background: rgba(255, 255, 255, .08);
    }

    .score-bar span {
      display: block;
      height: 100%;
      width: var(--score, 0%);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--amber));
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin: 12px 0;
    }

    .mini-card {
      min-height: 78px;
      padding: 12px;
    }

    .mini-card b {
      display: block;
      color: var(--mint);
      font-size: 12px;
      line-height: 1.25;
    }

    .mini-card span {
      display: block;
      margin-top: 7px;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.35;
      font-weight: 760;
    }

    .result-card {
      margin-top: 10px;
      padding: 14px;
    }

    .label {
      margin-bottom: 9px;
      color: var(--mint);
      font-size: 12px;
      font-weight: 850;
    }

    .match-list {
      display: grid;
      gap: 8px;
    }

    .match-row {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 9px;
      align-items: center;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, .055);
    }

    .match-row small {
      color: var(--mint);
      font-size: 12px;
      font-weight: 850;
    }

    .duel-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .duel-board {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .04);
    }

    .duel-board h3 {
      margin-bottom: 10px;
    }

    .duel-song {
      display: grid;
      grid-template-columns: 24px 30px 1fr;
      gap: 7px;
      align-items: center;
      min-height: 34px;
      margin-top: 6px;
      font-size: 12px;
    }

    .duel-song .cover-art {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      font-size: 8px;
    }

    .duel-song.same {
      border-radius: 7px;
      background: rgba(23, 215, 131, .1);
    }

    .empty {
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
      border-radius: 8px;
      border: 1px dashed var(--line);
      background: rgba(255, 255, 255, .035);
      font-size: 13px;
      line-height: 1.5;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      z-index: 50;
      width: min(360px, calc(100% - 36px));
      padding: 12px 14px;
      border-radius: 8px;
      color: var(--ink);
      background: rgba(9, 15, 13, .94);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      transform: translateX(-50%) translateY(120px);
      transition: transform .2s ease;
      font-size: 13px;
      line-height: 1.5;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .player-bubble {
      position: fixed;
      right: max(14px, calc((100vw - 430px) / 2 + 14px));
      bottom: calc(112px + env(safe-area-inset-bottom));
      z-index: 42;
      width: min(292px, calc(100% - 28px));
      min-height: 64px;
      padding: 9px 10px;
      border-radius: 999px;
      display: grid;
      grid-template-columns: 46px 1fr 38px;
      gap: 9px;
      align-items: center;
      color: var(--ink);
      background: rgba(16, 23, 20, .94);
      border: 1px solid rgba(156, 246, 199, .28);
      box-shadow: 0 18px 38px rgba(0, 0, 0, .38);
      transform: translateY(130px) scale(.96);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: transform .2s ease, opacity .2s ease, visibility .2s ease;
      backdrop-filter: blur(18px);
    }

    .player-bubble.show {
      transform: translateY(0) scale(1);
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .player-cover {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, .84);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .18), transparent 42%),
        linear-gradient(145deg, var(--cover-a, #17d783), var(--cover-b, #5bd8ff));
      border: 1px solid rgba(255, 255, 255, .16);
      font-size: 10px;
      font-weight: 950;
      animation: spin 5s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .player-meta {
      min-width: 0;
    }

    .player-meta b,
    .player-meta span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-meta b {
      font-size: 13px;
      line-height: 1.2;
    }

    .player-meta span {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
    }

    .player-toggle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #06100c;
      background: var(--mint);
    }

    .share-modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: end center;
      padding: 18px;
      background: rgba(0, 0, 0, .68);
      backdrop-filter: blur(12px);
    }

    .share-panel {
      width: min(430px, 100%);
      max-height: calc(100vh - 24px);
      overflow: auto;
      padding: 16px 16px 0;

      line-height: 1.45;
    }

    .share-preview {

      margin: 0 auto 14px;

    }

    .share-platforms {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 22px 16px;
      margin: 8px 0 24px;
    }

    .share-platforms button {
      min-height: 94px;
      padding: 0;
      border-radius: 0;
      color: #161616;

      border: 0;

    }

      return {
        id,
        name,

        coverA,
        coverB,
        listenUrl: `https://y.qq.com/n/ryqq/search?w=${encodeURIComponent(name)}`

    function currentArtist() {
      return artists.find(item => item.id === state.artistId) || artists[0];
    }

    function currentSongPool() {
      if (state.screen === "friendSort" || state.screen === "friendResult") {
        return state.challenge?.songs || [];
      }
      return currentArtist().songs;
    }

    function findSong(id) {
      return currentArtist().songs.find(item => item.id === id) || state.challenge?.songs?.find(item => item.id === id);
    }

    function go(screen, push = true) {
      if (push && state.screen !== screen) historyStack.push(state.screen);
      state.screen = screen;
      render();
    }

    function back() {
      const previous = historyStack.pop();
      if (previous) {
        state.screen = previous;
        render();
      } else {
        go("home", false);
      }
    }

    function icon(name) {
      return `<i data-lucide="${name}" aria-hidden="true"></i>`;

    function notify(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(notify.timer);
      notify.timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

      const item = playingSongId ? findSong(playingSongId) : null;

        playerToggle.innerHTML = icon("play");

        return;

      playerCover.textContent = item.name.slice(0, 2).toUpperCase();

      playerCover.style.setProperty("--cover-b", item.coverB);

    function render() {
      const screens = {
        home: renderHome,
        selectSongs: renderSelectSongs,
        creatorSort: () => renderSort(false),
        sharePage: renderSharePage,
        friendSort: () => renderSort(true),
        friendResult: renderFriendResult,
        challengeMissing: renderChallengeMissing
      };
      appMain.innerHTML = (screens[state.screen] || renderHome)();
      document.getElementById("backBtn").disabled = state.screen === "home";
      bindScreenEvents();
      updatePlayerBubble();
      refreshIcons();

    function bindScreenEvents() {
      document.querySelectorAll("[data-artist]").forEach(button => {
        button.addEventListener("click", () => {
          state.artistId = button.dataset.artist;
          state.search = "";
          state.selectedIds = [];
          state.creatorOrder = [];
          state.friendOrder = [];
          state.challenge = null;
          playingSongId = "";
          updatePlayerBubble();
          window.location.hash = "";
          go("selectSongs");
        });
      });

      const search = document.getElementById("songSearch");
      if (search) {
        search.addEventListener("input", event => {
          state.search = event.target.value;
          render();
          document.getElementById("songSearch")?.focus();
        });
      }

      document.querySelectorAll("[data-song]").forEach(button => {
        button.addEventListener("click", event => {
          if (event.target.closest("[data-play]")) return;
          const songId = button.dataset.song;
          const selected = state.selectedIds.includes(songId);
          if (selected) {
            state.selectedIds = state.selectedIds.filter(id => id !== songId);
          } else if (state.selectedIds.length < requiredCount) {
            state.selectedIds = [...state.selectedIds, songId];
          } else {
            notify("已经选满 6 首，先取消一首再选。");
          }
          render();
        });
      });

      document.querySelectorAll("[data-remove-selected]").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          state.selectedIds = state.selectedIds.filter(id => id !== button.dataset.removeSelected);
          render();
        });
      });

      document.querySelectorAll("[data-play]").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          const item = findSong(button.dataset.play);
          setPlayingSong(item.id);
          notify(playingSongId ? `正在播放预览：${item.name}` : "已暂停播放预览。");
        });
      });

      document.querySelectorAll("[data-rank-list]").forEach(list => bindDragSort(list));

      document.querySelectorAll("[data-action]").forEach(button => {
        button.addEventListener("click", () => handleAction(button.dataset.action));
      });
    }

    function bindDragSort(list) {
      list.querySelectorAll(".rank-card").forEach(card => {
        const handle = card.querySelector(".drag-handle");
        handle.addEventListener("pointerdown", event => {
          event.preventDefault();
          draggingSongId = card.dataset.rankSong;
          card.classList.add("dragging");
          handle.setPointerCapture(event.pointerId);
        });

        handle.addEventListener("pointermove", event => {
          if (!draggingSongId) return;
          const target = document.elementFromPoint(event.clientX, event.clientY)?.closest(".rank-card");
          if (!target || target.dataset.rankSong === draggingSongId) return;
          const current = list.querySelector(`[data-rank-song="${draggingSongId}"]`);
          const cards = [...list.querySelectorAll(".rank-card")];
          if (cards.indexOf(current) < cards.indexOf(target)) {
            target.after(current);
          } else {
            target.before(current);
          }
          refreshRankNumbers(list);
        });

        handle.addEventListener("pointerup", event => {
          handle.releasePointerCapture(event.pointerId);
          commitRankOrder(list);
          draggingSongId = "";
          card.classList.remove("dragging");
        });

        handle.addEventListener("pointercancel", () => {
          draggingSongId = "";
          card.classList.remove("dragging");
        });
      });
    }

    function refreshRankNumbers(list) {
      list.querySelectorAll(".rank-card").forEach((card, index) => {
        card.querySelector(".rank-no").textContent = `#${index + 1}`;
      });
    }

    function commitRankOrder(list) {
      const key = list.dataset.rankList === "friend" ? "friendOrder" : "creatorOrder";
      state[key] = [...list.querySelectorAll(".rank-card")].map(card => card.dataset.rankSong);
      render();
    }

    function handleAction(action) {
      if (action === "clear-selection") {
        state.selectedIds = [];
        render();
      }
      if (action === "to-creator-sort") {
        state.creatorOrder = [...state.selectedIds];
        go("creatorSort");
      }
      if (action === "back-to-select") {
        go("selectSongs");
      }
      if (action === "create-challenge") {
        const songs = state.creatorOrder.map(findSong).filter(Boolean);
        state.challenge = { artistId: state.artistId, order: [...state.creatorOrder], songs };
        go("sharePage");
      }
      if (action === "receiver-preview") {
        const songs = state.challenge?.songs || state.creatorOrder.map(findSong).filter(Boolean);
        state.challenge = { artistId: state.artistId, order: [...state.creatorOrder], songs };
        state.friendOrder = shuffledOrder(songs.map(item => item.id), state.creatorOrder);
        go("friendSort");
      }
      if (action === "finish-friend") {
        go("friendResult");
      }
      if (action === "share-result") {
        openShareModal();
      }
      if (action === "new-challenge") {
        state.selectedIds = [];
        state.creatorOrder = [];
        state.friendOrder = [];
        state.challenge = null;
        playingSongId = "";
        updatePlayerBubble();
        window.location.hash = "";
        go("selectSongs");
      }
      if (action === "go-home") {
        playingSongId = "";
        updatePlayerBubble();
        window.location.hash = "";
        go("home");
      }
    }

    function challengeLink() {
      const url = new URL(window.location.href);
      url.search = "";
      const songs = (state.challenge?.songs || state.creatorOrder.map(findSong)).filter(Boolean);
      const payload = {
        artistId: state.artistId,
        order: [...(state.challenge?.order || state.creatorOrder)],
        songs
      };
      url.hash = `challenge=${encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(payload)))))}`;
      return url.toString();
    }

    function initRoute() {
      const match = window.location.hash.match(/challenge=([^&]+)/);
      if (!match) return false;
      try {
        const challenge = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(match[1])))));
        const artistExists = artists.some(artist => artist.id === challenge.artistId);
        if (!artistExists || !Array.isArray(challenge.order) || !Array.isArray(challenge.songs)) {
          state.screen = "challengeMissing";
          return true;
        }
        state.artistId = challenge.artistId;
        state.challenge = challenge;
        state.creatorOrder = [...challenge.order];
        state.selectedIds = [...challenge.order];
        state.friendOrder = shuffledOrder(challenge.songs.map(item => item.id), challenge.order);
        state.screen = "friendSort";
        return true;
      } catch (error) {
        state.screen = "challengeMissing";
        return true;
      }
    }

    function shuffledOrder(ids, sourceOrder = []) {
      const next = [...ids];
      if (next.length < 2) return next;
      const swapCount = Math.min(2, Math.floor(next.length / 2));
      for (let count = 0; count < swapCount; count += 1) {
        const from = Math.floor(Math.random() * next.length);
        const direction = Math.random() > .5 ? 1 : -1;
        const to = Math.max(0, Math.min(next.length - 1, from + direction));
        if (from !== to) {
          [next[from], next[to]] = [next[to], next[from]];
        }
      }
      if (sourceOrder.length === next.length && next.every((id, index) => sourceOrder[index] === id)) {
        [next[0], next[1]] = [next[1], next[0]];
      }
      return next;
    }

    function calculateMatch() {
      const creator = state.creatorOrder;
      const friend = state.friendOrder;
      const n = creator.length;
      const maxDistance = Math.floor((n * n) / 2);
      const distances = creator.map(id => Math.abs(creator.indexOf(id) - friend.indexOf(id)));
      const totalDistance = distances.reduce((sum, value) => sum + value, 0);
      const creatorTop = creator.slice(0, 3);
      const friendTop = friend.slice(0, 3);
      const commonTopCount = friendTop.filter(id => creatorTop.includes(id)).length;
      const exactIds = creator.filter((id, index) => friend[index] === id);
      const distanceRatio = maxDistance ? totalDistance / maxDistance : 0;
      const score = Math.min(99, Math.max(35, Math.round(
        45
        + (1 - distanceRatio) * 45
        + commonTopCount * 4
        + exactIds.length * 2
      )));
      const biggest = creator.reduce((best, id) => {
        const gap = Math.abs(creator.indexOf(id) - friend.indexOf(id));
        return gap > best.gap ? { id, gap } : best;
      }, { id: creator[0], gap: 0 });
      const biggestSong = findSong(biggest.id);
      const sharedRows = creator.map(id => ({
        song: findSong(id),
        creatorRank: creator.indexOf(id) + 1,
        friendRank: friend.indexOf(id) + 1
      }));
      const copy = resultCopyConfig(score, exactIds.length);
      return {
        score,
        title: copy.title,
        copy: copy.copy,
        commonTopCount,
        exactCount: exactIds.length,
        exactIds,
        biggestGap: biggest.gap === 0 ? "没有明显分歧" : `${biggestSong.name} 差 ${biggest.gap} 位`,
        shareSpark: copy.shareSpark,
        callToAction: copy.callToAction,
        sharedRows
      };
    }

    function resultCopyConfig(score, exactCount) {
      const tier = score >= 90 ? "over90" : score >= 75 ? "over75" : score >= 55 ? "over55" : "under55";
      const fallback = resultCopyByArtist.jay[tier];
      const config = resultCopyByArtist[state.artistId]?.[tier] || fallback;
      return {
        title: config.title,
        copy: config.copy,
        shareSpark: config.shareSpark.replace("{exactCount}", exactCount),
        callToAction: config.callToAction
      };
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines = 3) {
      const chars = String(text).split("");
      const lines = [];
      let line = "";
      chars.forEach(char => {
        const testLine = line + char;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          lines.push(line);
          line = char;
        } else {
          line = testLine;
        }
      });
      if (line) lines.push(line);
      lines.slice(0, maxLines).forEach((item, index) => {
        const output = index === maxLines - 1 && lines.length > maxLines ? item.slice(0, -1) + "…" : item;
        ctx.fillText(output, x, y + index * lineHeight);
      });
    }

    function drawRoundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + width, y, x + width, y + height, radius);
      ctx.arcTo(x + width, y + height, x, y + height, radius);
      ctx.arcTo(x, y + height, x, y, radius);
      ctx.arcTo(x, y, x + width, y, radius);
      ctx.closePath();
    }

    function hexToRgb(hex) {
      const value = hex.replace("#", "");
      return {
        r: parseInt(value.slice(0, 2), 16),
        g: parseInt(value.slice(2, 4), 16),
        b: parseInt(value.slice(4, 6), 16)
      };
    }

    function generateShareCard() {
      const artist = currentArtist();
      const songs = (state.challenge?.songs || state.creatorOrder.map(findSong)).filter(Boolean);
      const canvas = document.createElement("canvas");
      const width = 900;
      const height = 1200;
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      const accent = hexToRgb(artist.accent);

      const bg = ctx.createLinearGradient(0, 0, width, height);
      bg.addColorStop(0, "#101714");
      bg.addColorStop(.5, "#090f0d");
      bg.addColorStop(1, "#141820");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);

      const glow = ctx.createRadialGradient(260, 140, 20, 260, 140, 520);
      glow.addColorStop(0, `rgba(${accent.r}, ${accent.g}, ${accent.b}, .42)`);
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = "#9cf6c7";
      ctx.font = "800 28px sans-serif";
      ctx.fillText("同担 Top6 挑战", 64, 86);

      ctx.fillStyle = "#f6f7ef";
      ctx.font = "900 72px sans-serif";
      wrapCanvasText(ctx, `${artist.name} 排序默契`, 64, 180, 720, 82, 2);

      ctx.fillStyle = "rgba(246,247,239,.76)";
      ctx.font = "400 30px sans-serif";
      wrapCanvasText(ctx, "我选好了 6 首歌，来排出你心里的顺序，看看我们默契有多高。", 66, 340, 740, 42, 3);

      songs.slice(0, 6).forEach((songItem, index) => {
        const y = 500 + index * 78;
        drawRoundRect(ctx, 64, y, 760, 58, 16);
        ctx.fillStyle = "rgba(255,255,255,.075)";
        ctx.fill();
        const c1 = hexToRgb(songItem.coverA);
        const c2 = hexToRgb(songItem.coverB);
        const cover = ctx.createLinearGradient(92, y + 10, 136, y + 48);
        cover.addColorStop(0, `rgb(${c1.r}, ${c1.g}, ${c1.b})`);
        cover.addColorStop(1, `rgb(${c2.r}, ${c2.g}, ${c2.b})`);
        ctx.fillStyle = cover;
        drawRoundRect(ctx, 88, y + 8, 42, 42, 8);
        ctx.fill();
        ctx.fillStyle = "#ffd166";
        ctx.font = "900 22px sans-serif";
        ctx.fillText(`#${index + 1}`, 150, y + 38);
        ctx.fillStyle = "#f6f7ef";
        ctx.font = "800 26px sans-serif";
        ctx.fillText(songItem.name, 220, y + 38);
        ctx.fillStyle = "rgba(246,247,239,.58)";
        ctx.font = "400 22px sans-serif";
        ctx.fillText(songItem.album, 520, y + 38);
      });

      drawRoundRect(ctx, 64, 1028, 772, 92, 20);
      ctx.fillStyle = `rgba(${accent.r}, ${accent.g}, ${accent.b}, .18)`;
      ctx.fill();
      ctx.fillStyle = "#f6f7ef";
      ctx.font = "900 32px sans-serif";
      ctx.fillText("扫码或点链接参与挑战", 94, 1084);
      ctx.fillStyle = "rgba(246,247,239,.5)";
      ctx.font = "400 20px sans-serif";
      ctx.fillText("QQ 音乐同担默契局", 94, 1118);

      return canvas.toDataURL("image/png");
    }

    function openShareModal() {
      currentShareCardUrl = generateShareCard();
      sharePreview.src = currentShareCardUrl;
      shareModal.classList.remove("hidden");
      refreshIcons();
    }

    function closeShare() {
      shareModal.classList.add("hidden");
    }

    function downloadShareCard() {
      if (!currentShareCardUrl) currentShareCardUrl = generateShareCard();
      const artist = currentArtist();
      const link = document.createElement("a");
      link.href = currentShareCardUrl;
      link.download = `${artist.name}-同担Top6挑战.png`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      notify("挑战海报已下载。");
    }

    function dataUrlToFile(dataUrl, fileName) {
      const [meta, data] = dataUrl.split(",");
      const mime = meta.match(/data:(.*);base64/)?.[1] || "image/png";
      const binary = atob(data);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return new File([bytes], fileName, { type: mime });
    }

    async function shareToChannel(channel) {
      if (channel === "download") {
        downloadShareCard();
        return;
      }
      const artist = currentArtist();
      const link = challengeLink();
      const text = `我创建了${artist.name}同担 Top6 排序挑战，来测测我们的默契度：${link}`;
      copyText(text);
      const names = { wechat: "微信好友", moments: "朋友圈", weibo: "新浪微博", qq: "QQ 好友", qzone: "QQ 空间", xiaohongshu: "小红书", message: "私信", copy: "链接" };
      notify(channel === "copy" ? "链接已复制，好友打开后会排序同一组歌。" : `已复制${names[channel] || "平台"}分享文案，请保存图片后发布。`);
      if (navigator.share && !["xiaohongshu", "copy"].includes(channel)) {
        const file = dataUrlToFile(currentShareCardUrl || generateShareCard(), `${artist.name}-同担Top6挑战.png`);
        const sharePayload = { title: `${artist.name}同担 Top6 挑战`, text, url: link };
        if (navigator.canShare?.({ files: [file] })) {
          sharePayload.files = [file];
        }
        try {
          await navigator.share(sharePayload);
        } catch (error) {
          // Native share cancellation is expected.
        }
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;");
    }

    document.getElementById("homeBtn").addEventListener("click", () => {
      playingSongId = "";
      updatePlayerBubble();
      go("home");
    });
    document.getElementById("backBtn").addEventListener("click", back);
    playerToggle.addEventListener("click", () => {
      const wasPlaying = Boolean(playingSongId);
      playingSongId = "";
      updatePlayerBubble();
      if (wasPlaying) notify("已暂停播放预览。");
    });
    closeShareModal.addEventListener("click", closeShare);
    cancelShareModal.addEventListener("click", closeShare);
    shareModal.addEventListener("click", event => {
      if (event.target === shareModal) closeShare();
    });
    document.querySelectorAll("[data-share-channel]").forEach(button => {
      button.addEventListener("click", () => shareToChannel(button.dataset.shareChannel));
    });

    window.addEventListener("hashchange", () => {
      if (!initRoute()) go("home");
      render();
    });

    initRoute();
    render();
  </script>
</body>
